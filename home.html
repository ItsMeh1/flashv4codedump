<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash v4 | Home</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #5e99ff; 
            --bg: #050505;
            /* Using the Apple System Font stack */
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- HERO SECTION --- */
        .hero-section {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: appleFadeIn 1.2s ease-out;
        }

        .logo-container {
            width: 100px;
            height: 100px;
            margin-bottom: 24px;
            position: relative;
        }

        .bolt-svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: white;
            stroke-width: 1.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 15px rgba(94, 153, 255, 0.4));
            transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .logo-container:hover .bolt-svg {
            transform: scale(1.05);
            stroke: var(--accent);
            filter: drop-shadow(0 0 25px var(--accent));
        }

        .title {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin: 0;
            line-height: 1.1;
        }

        .title span {
            background: linear-gradient(180deg, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text; /* Vendor prefix for Chrome/Safari */
            background-clip: text;         /* Standard property for compatibility */
            -webkit-text-fill-color: transparent;
        }

        /* --- AUTOMATED EASTER EGG --- */
        .status-container {
            margin-top: 16px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #easter-egg {
            font-size: 14px;
            font-weight: 500;
            color: #666;
            letter-spacing: 0.01em;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #easter-egg.fade {
            opacity: 0;
            transform: translateY(5px);
        }

        /* --- BUTTONS --- */
        .actions {
            margin-top: 60px;
        }

        .btn-credits {
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px); /* Standard property */
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #eee;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-credits:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            color: white;
        }

        @keyframes appleFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="logo-container">
            <svg class="bolt-svg" viewBox="0 0 24 24">
                <path d="M13 2L3 14H12V22L22 10H13V2Z"/>
            </svg>
        </div>
        
        <h1 class="title">Flash <span>v4</span></h1>
        
        <div class="status-container">
            <div id="easter-egg">Initializing...</div>
        </div>
    </div>

    <div class="actions">
        <a href="credits.html" class="btn-credits">
            <i data-lucide="users" size="14"></i>
            Credits
        </a>
    </div>

    <script>
        const phrases = [
            "Blue is the fastest frequency",
            "Now with zero carbon footprint lmao",
            "It just works. Usually.",
            "The magic of v4",
            "Designed in Cupertino. Sort of.",
            "Did some1 say movies?",
            "ok lets play games",
            "ok rishon",
            "so no one saw v3 but that doesn't mean it doesn't exist because you haven't seen it so there isn't any proof against it...",
            "Made by ItsMeh1"
        ];

        let index = 0;
        const textEl = document.getElementById('easter-egg');

        function rotateText() {
            textEl.classList.add('fade');
            
            setTimeout(() => {
                index = (index + 1) % phrases.length;
                textEl.innerText = phrases[index];
                textEl.classList.remove('fade');
            }, 500);
        }

        // Set interval to 4 seconds
        setInterval(rotateText, 4000);
        
        // Run once at start to pick a random first phrase
        textEl.innerText = phrases[Math.floor(Math.random() * phrases.length)];

        lucide.createIcons();
    </script>
</body>
</html>
