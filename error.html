<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Flash v4</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #5e99ff; 
            --bg: #050505;
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .error-container {
            text-align: center;
            max-width: 400px;
            padding: 40px;
            animation: slideUp 0.8s cubic-bezier(0.2, 1, 0.2, 1);
        }

        /* --- THE ERROR ICON --- */
        .icon-box {
            margin-bottom: 24px;
            color: #333;
            display: inline-flex;
            position: relative;
        }

        .icon-box::after {
            content: '';
            position: absolute;
            inset: -10px;
            background: var(--accent);
            filter: blur(40px);
            opacity: 0.15;
            z-index: -1;
        }

        /* --- TEXT --- */
        .error-code {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }

        .description {
            font-size: 16px;
            color: #888;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        /* --- ACTION BUTTONS --- */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: white;
            color: black;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #eee;
            border: 1px solid rgba(255, 255, 255, 0.1);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="icon-box">
            <i data-lucide="search-alert" size="48"></i>
        </div>

        <p class="error-code">Error 404</p>
        <h1 class="title">Lost in blue space</h1>
        <p class="description">
            This page couldn't be found. If you think this is a mistake, please contact the owner to report the problem.
        </p>

        <div class="actions">
            <a href="home.html" class="btn btn-primary">
                <i data-lucide="home" size="16"></i>
                Back Home
            </a>

            <a href="credits.html" class="btn btn-secondary">
                <i data-lucide="users" size="16"></i>
                Credits
            </a>
            
            <a href="mailto:owner@example.com" class="btn btn-secondary">
                <i data-lucide="message-square" size="16"></i>
                Contact Owner
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
