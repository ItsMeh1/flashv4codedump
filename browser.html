<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash v4</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* Precision Typography */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg: #000;
            --bg-secondary: #0e0e0e;
            --accent: #a5c7ff;
            --font-main: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: white;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- BROWSER UI --- */
        .controls {
            padding: 8px 12px;
            background: var(--bg);
        }

        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            align-items: center;
        }

        .tab {
            background: var(--bg-secondary);
            min-width: 180px;
            height: 36px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        /* Added Active Tab Styling */
        .tab.active { background: #1a1a1a; border-color: #333; }
        .tab:hover:not(.active) { background: #151515; }

        .tab i.fa-bolt { color: var(--accent); font-size: 12px; }
        .tab .close { margin-left: auto; font-size: 10px; opacity: 0.5; cursor: pointer; }
        .tab .close:hover { opacity: 1; color: #ff5555; }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            width: 38px;
            height: 38px;
            background: var(--bg-secondary);
            border: none;
            border-radius: 14px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px; 
            cursor: pointer;
            transition: 0.1s;
        }
        .btn:active { transform: scale(0.92); }

        .url-bar {
            flex: 1;
            height: 38px;
            background: var(--bg-secondary);
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 15px;
        }

        .url-bar i { font-size: 12px; color: #555; margin-right: 10px; }
        .url-bar input {
            background: transparent;
            border: none;
            color: #888;
            font-size: 14px;
            width: 100%;
        }

        /* --- THE STAGE (Added to hold iframes properly) --- */
        #frame-container {
            position: relative;
            height: calc(100vh - 100px);
            width: 100%;
        }

        /* The floating iframes */
        .browser-frame {
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: calc(100% - 16px);
            height: calc(100% - 8px);
            background: #fff;
            border: none;
            border-radius: 16px;
            display: none;
            z-index: 5;
        }

        /* --- HOME PAGE --- */
        .home {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 100px;
        }

        .logo { font-size: 110px; font-weight: 800; letter-spacing: -6px; margin-bottom: 40px; }
        .logo span { background: linear-gradient(180deg, #fff 30%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .search-main {
            width: 580px; height: 54px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 18px;
            display: flex; align-items: center; padding: 0 20px; margin-bottom: 50px;
        }

        .search-main i { color: #444; font-size: 16px; }
        .search-main input { background: transparent; border: none; color: white; padding-left: 15px; font-size: 16px; width: 100%; }

        .grid { display: flex; gap: 18px; }
        .tile { text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .tile-icon {
            width: 90px; height: 90px; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05);
            border-radius: 26px; display: flex; align-items: center; justify-content: center;
            transition: 0.2s cubic-bezier(0.2, 0, 0.2, 1);
        }
        .tile:hover .tile-icon { transform: translateY(-5px); background: #111; }
        .tile-icon img { width: 36px; height: 36px; }
        .tile span { font-size: 12px; font-weight: 600; color: #fff; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="tabs" id="tab-list">
            <button class="btn" style="width:36px; height:36px;" onclick="createNewTab()"><i class="fa-solid fa-plus"></i></button>
        </div>

        <div class="toolbar">
            <button class="btn"><i class="fa-solid fa-arrow-left"></i></button>
            <button class="btn"><i class="fa-solid fa-arrow-right"></i></button>
            <button class="btn"><i class="fa-solid fa-rotate-right"></i></button>
            
            <div class="url-bar">
                <i class="fa-solid fa-globe"></i>
                <input type="text" id="url-input" placeholder="Search for something or enter a URL here...">
            </div>

            <button class="btn"><i class="fa-solid fa-arrow-up-right-from-square"></i></button>
            <button class="btn"><i class="fa-solid fa-expand"></i></button>
            <button class="btn"><i class="fa-solid fa-chevron-down"></i></button>
        </div>
    </div>

    <div id="frame-container">
        
        <div class="home" id="ntp">
            <h1 class="logo">Flash <span>v4</span></h1>

            <div class="search-main">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="main-search" placeholder="Search for anything!">
            </div>

            <div class="grid">
                <a href="#" class="tile"><div class="tile-icon"><img src="https://www.nvidia.com/favicon.ico"></div><span>GeForce NOW</span></a>
                <a href="#" class="tile"><div class="tile-icon"><img src="https://www.youtube.com/favicon.ico"></div><span>YouTube</span></a>
                <a href="#" class="tile"><div class="tile-icon"><img src="https://github.com/favicon.ico" style="filter:invert(1)"></div><span>GitHub</span></a>
                <a href="#" class="tile"><div class="tile-icon"><img src="https://www.google.com/favicon.ico"></div><span>Google</span></a>
            </div>
        </div>
        
        </div>

    <script>
        let tabCounterID = 0;
        let activeTabID = null;

        const tabList = document.getElementById('tab-list');
        const frameContainer = document.getElementById('frame-container');
        const ntp = document.getElementById('ntp');
        const urlInput = document.getElementById('url-input');
        const mainSearch = document.getElementById('main-search');

        // 1. Create a New Tab
        function createNewTab() {
            tabCounterID++;
            const currentID = tabCounterID;

            // Create the Tab UI Element
            const newTab = document.createElement('div');
            newTab.className = 'tab';
            newTab.id = `tab-${currentID}`;
            
            // Note: onclick event passes the ID so it knows which one to open
            newTab.innerHTML = `
                <i class="fa-solid fa-bolt"></i>
                <span>New Tab</span>
                <i class="fa-solid fa-xmark close" onclick="closeTab(${currentID}, event)"></i>
            `;
            newTab.onclick = () => switchTab(currentID);

            // Insert it right before the '+' button
            tabList.insertBefore(newTab, tabList.lastElementChild);

            // Create the invisible Iframe Element
            const newFrame = document.createElement('iframe');
            newFrame.className = 'browser-frame';
            newFrame.id = `frame-${currentID}`;
            newFrame.src = "about:blank"; // Starts empty

            frameContainer.appendChild(newFrame);

            // Automatically switch to the newly created tab
            switchTab(currentID);
        }

        // 2. Switch Between Tabs
        function switchTab(id) {
            activeTabID = id;

            // Hide all frames and remove 'active' styling from all tabs
            document.querySelectorAll('.browser-frame').forEach(frame => frame.style.display = 'none');
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));

            // Give the target tab the 'active' styling
            const targetTab = document.getElementById(`tab-${id}`);
            if (targetTab) targetTab.classList.add('active');

            // Check if the iframe has a real URL. If not, show the Home Page (NTP)
            const targetFrame = document.getElementById(`frame-${id}`);
            if (targetFrame.src === "about:blank" || targetFrame.src === window.location.href) {
                ntp.style.display = 'flex';
                urlInput.value = "";
            } else {
                ntp.style.display = 'none';
                targetFrame.style.display = 'block';
                urlInput.value = targetFrame.src;
            }
        }

        // 3. Navigation Engine (Typing a URL and pressing Enter)
        function navigate(query) {
    if (!activeTabID || !query) return;

    let finalUrl = query.trim();
    const proxyBase = "https://cherrion.top/scramjet/";

    // This Regex checks if the string starts with http/https OR looks like "domain.tld"
    const urlPattern = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/;

    if (urlPattern.test(finalUrl)) {
        // It's a URL! Check if it's missing the protocol
        if (!finalUrl.startsWith('http')) {
            finalUrl = `https://${finalUrl}`;
        }
    } else {
        // It's a search term
        finalUrl = `https://duckduckgo.com/?q=${encodeURIComponent(finalUrl)}`;
    }

    const proxiedUrl = proxyBase + encodeURIComponent(finalUrl);

    // --- UI Update Logic ---
    ntp.style.display = 'none';
    const frame = document.getElementById(`frame-${activeTabID}`);
    frame.style.display = 'block';
    frame.src = proxiedUrl;

    urlInput.value = finalUrl;
    
    const tabText = document.querySelector(`#tab-${activeTabID} span`);
    if(tabText) tabText.innerText = finalUrl.split('//')[1]?.split('/')[0] || finalUrl;

    console.log(proxiedUrl)
}

        // Listen for "Enter" key on top bar
        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') navigate(urlInput.value);
        });

        // Listen for "Enter" key on home page giant search bar
        mainSearch.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') navigate(mainSearch.value);
        });

        // 4. Close a tab (Basic implementation)
        function closeTab(id, event) {
            event.stopPropagation(); // Stops the 'switchTab' click from firing at the same time
            
            document.getElementById(`tab-${id}`).remove();
            document.getElementById(`frame-${id}`).remove();

            // If we closed the active tab, just fall back to the first available tab
            if (activeTabID === id) {
                const remainingTabs = document.querySelectorAll('.tab');
                if (remainingTabs.length > 0) {
                    const firstTabId = remainingTabs[0].id.split('-')[1];
                    switchTab(firstTabId);
                } else {
                    // No tabs left? Make a new one automatically
                    createNewTab();
                }
            }
        }

        // Create the very first tab when the page loads
        createNewTab();

    </script>
</body>
</html>
